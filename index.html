<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperación - Primer Parcial</title>
</head>
<body>
  <header>
    <h1>Recuperación - Primer Parcial</h1>
  </header>

  <main>
    <section>
      <h2>Ejercicio 1: Usuarios y contraseñas</h2>
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" name="usuario" autocomplete="username">

      <label for="contrasena">Contraseña</label>
      <input type="password" id="contrasena" name="contrasena" autocomplete="current-password">

      <button id="btnAcceder" type="button">Acceder</button>
      <p id="resultadoAcceso"></p>
    </section>

    <section>
      <h2>Ejercicio 2: Array de objetos</h2>
      <p>Usar este espacio para cargar o analizar el array <strong>alumnos</strong>.</p>
      <p id="resultadoAlumnos"></p>
    </section>

    <section>
      <h2>Ejercicio 3: Manipulación del DOM</h2>
      <label for="inputTexto">Texto</label>
      <input type="text" id="inputTexto" name="inputTexto" placeholder="Escribe aquí">

      <button id="btnEvaluar" type="button">Evaluar</button>
      <p id="resultado"></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
